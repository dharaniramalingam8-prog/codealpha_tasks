<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Vibe</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand" onclick="window.location.href='/feed.html'">✦ Vibe</span>
    <div class="navbar-actions">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" class="search-input" placeholder="Search people..." autocomplete="off" />
        <div class="search-results" id="search-results"></div>
      </div>
      <div class="notif-wrapper">
        <button class="notif-btn" onclick="toggleNotifDropdown()">🔔<span class="notif-badge" id="notif-badge" style="display:none">0</span></button>
        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-dropdown-header"><h3>Notifications</h3></div>
          <div id="notif-list"></div>
        </div>
      </div>
      <a href="/messages.html" class="dm-btn">💬</a>
      <button class="theme-toggle-btn" id="theme-toggle" onclick="handleThemeToggle()">☀️</button>
      <div id="nav-avatar"></div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="page-layout" style="grid-template-columns:1fr;max-width:680px">
    <main class="main-content">
      <div style="margin-bottom:16px">
        <button class="btn btn-secondary btn-sm" onclick="history.back()">← Back</button>
      </div>

      <!-- Post -->
      <div id="post-container">
        <div class="card post-card">
          <div class="post-header">
            <div class="skeleton" style="width:48px;height:48px;border-radius:50%"></div>
            <div style="flex:1"><div class="skeleton" style="height:14px;width:120px;margin-bottom:6px;border-radius:4px"></div></div>
          </div>
          <div class="skeleton" style="height:80px;margin:12px 0;border-radius:8px"></div>
          <div class="skeleton" style="height:32px;width:160px;border-radius:20px"></div>
        </div>
      </div>

      <!-- Comments -->
      <div class="card" style="padding:20px;margin-top:4px">
        <h3 style="margin-bottom:16px;font-size:1rem;font-weight:700">
          💬 Comments <span id="comment-count" style="color:var(--text-muted);font-size:.875rem;font-weight:400"></span>
        </h3>

        <!-- Add Comment -->
        <div style="display:flex;gap:12px;margin-bottom:20px;align-items:flex-start">
          <div id="comment-avatar"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px">
            <textarea id="comment-input" class="input" rows="2"
              placeholder="Add a comment… (Ctrl+Enter to submit)" maxlength="300"
              style="resize:none;font-size:.9rem;padding:10px 12px"
              onkeydown="handleCommentKey(event)"></textarea>
            <div style="display:flex;justify-content:flex-end">
              <button class="btn btn-primary btn-sm" id="comment-btn" onclick="addComment()">Comment 💬</button>
            </div>
          </div>
        </div>

        <div id="comments-list">
          <div class="skeleton" style="height:60px;margin-bottom:8px;border-radius:8px"></div>
          <div class="skeleton" style="height:60px;border-radius:8px"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Post Modal -->
  <div class="modal-overlay" id="edit-post-modal">
    <div class="modal">
      <div class="modal-header"><h2 class="modal-title">Edit Post</h2><button class="modal-close" onclick="closeEditModal()">✕</button></div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="input-group">
          <label for="edit-content">Content</label>
          <textarea id="edit-content" class="edit-textarea" maxlength="500"></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button class="btn btn-primary" id="edit-save-btn" onclick="saveEdit()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/post.js"></script>
</body>
</html>
