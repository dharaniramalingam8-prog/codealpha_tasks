<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Vibe Social</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-color);
      margin: 0;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Reset Password</h2>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Enter your new password below.</p>
    <div id="error-msg" class="auth-error"></div>
    <div id="success-msg" style="display:none; color: green; margin-bottom: 15px;"></div>
    
    <form id="reset-form">
      <div class="input-group">
        <input type="password" id="new-password" class="input" placeholder="New Password" required minlength="6">
      </div>
      <div class="input-group">
        <input type="password" id="confirm-password" class="input" placeholder="Confirm Password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="reset-btn">Reset Password</button>
    </form>
    <a href="/index.html" style="display: block; margin-top: 15px; color: var(--accent); text-decoration: none;">Back to Login</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('error-msg').textContent = 'Invalid or missing reset token.';
      document.getElementById('error-msg').classList.add('show');
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('reset-btn');

      if (newPassword !== confirmPassword) {
        const err = document.getElementById('error-msg');
        err.textContent = 'Passwords do not match.';
        err.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: newPassword })
        });
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Failed to reset password');

        document.getElementById('error-msg').classList.remove('show');
        const succ = document.getElementById('success-msg');
        succ.textContent = data.message;
        succ.style.display = 'block';
        document.getElementById('reset-form').style.display = 'none';
      } catch (err) {
        const el = document.getElementById('error-msg');
        el.textContent = err.message;
        el.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Reset Password';
      }
    });
  </script>
</body>
</html>
