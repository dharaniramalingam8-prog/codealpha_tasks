<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels — Vibe</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-color, #0d0d1a);
      color: var(--text-color, #e0e0ff);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── LEFT SIDEBAR ── */
    .reels-sidebar {
      width: 260px;
      height: 100vh;
      background: var(--bg-card, #13132b);
      border-right: 1px solid var(--glass-border, rgba(108,99,255,0.15));
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 24px;
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6C63FF, #FF6B9D);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
    }

    .sidebar-nav {
      list-style: none;
      flex: 1;
      padding: 0 12px;
    }

    .sidebar-nav li {
      margin-bottom: 2px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-muted, #a0a0c8);
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s;
      position: relative;
    }

    .sidebar-nav a:hover {
      background: var(--bg-hover, rgba(108,99,255,0.1));
      color: var(--text-color, #e0e0ff);
    }

    .sidebar-nav a.active {
      background: linear-gradient(135deg, rgba(108,99,255,0.25), rgba(255,107,157,0.15));
      color: #fff;
      font-weight: 600;
    }

    .sidebar-nav a .nav-icon {
      font-size: 1.2rem;
      width: 24px;
      text-align: center;
    }

    .sidebar-badge {
      background: linear-gradient(135deg, #6C63FF, #FF6B9D);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 6px;
      min-width: 20px;
      text-align: center;
      margin-left: auto;
    }

    .sidebar-user {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--glass-border, rgba(108,99,255,0.1));
      margin-top: 8px;
      cursor: pointer;
      border-radius: 0 0 0 0;
      transition: background 0.2s;
    }
    .sidebar-user:hover {
      background: var(--bg-hover, rgba(108,99,255,0.1));
    }
    .sidebar-user-info {
      flex: 1;
      min-width: 0;
    }
    .sidebar-user-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-user-handle {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── CENTER: VIDEO FEED ── */
    .reels-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Top bar inside the reels main */
    .reels-topbar {
      height: 56px;
      border-bottom: 1px solid var(--glass-border, rgba(108,99,255,0.1));
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg-color, #0d0d1a);
    }

    .reels-topbar-title {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6C63FF, #FF6B9D);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .reels-topbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .topbar-icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-color);
    }

    /* Video feed area */
    .reels-feed-wrapper {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .reels-scroll-container {
      height: 100%;
      width: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .reels-scroll-container::-webkit-scrollbar { display: none; }

    /* Individual reel */
    .reel-slide {
      height: 100%;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #000;
    }

    .reel-video-box {
      position: relative;
      height: 100%;
      max-height: calc(100vh - 56px);
      aspect-ratio: 9/16;
      background: #111;
      overflow: hidden;
    }

    .reel-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    /* Gradient overlay */
    .reel-gradient-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      pointer-events: none;
    }
    .reel-gradient-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      pointer-events: none;
    }

    /* Top info bar (avatar, username, follow) */
    .reel-top-bar {
      position: absolute;
      top: 16px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .reel-author-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      object-fit: cover;
      cursor: pointer;
      flex-shrink: 0;
    }
    .reel-author-avatar-initials {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .reel-top-info {
      flex: 1;
      min-width: 0;
    }

    .reel-top-username {
      font-weight: 700;
      color: #fff;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .reel-top-username .verified {
      color: #6C63FF;
      font-size: 0.85rem;
    }

    .reel-top-time {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
    }

    .reel-follow-btn {
      background: linear-gradient(135deg, #6C63FF, #FF6B9D);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .reel-follow-btn:hover { opacity: 0.85; }
    .reel-follow-btn.following {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .reel-more-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px;
    }

    /* Right action buttons */
    .reel-actions-side {
      position: absolute;
      right: 12px;
      bottom: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 10;
    }

    .reel-action-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .reel-action-item button {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border: none;
      color: #fff;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .reel-action-item button:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }

    .reel-action-item button.liked {
      background: rgba(255, 71, 87, 0.25);
      color: #ff4757;
    }

    .reel-action-count {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.85);
      font-weight: 600;
    }

    /* Bottom info */
    .reel-bottom-info {
      position: absolute;
      bottom: 24px;
      left: 14px;
      right: 65px;
      z-index: 10;
    }

    .reel-caption {
      font-size: 0.88rem;
      color: #fff;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .reel-hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .reel-hashtag {
      font-size: 0.8rem;
      color: #a0a8ff;
      font-weight: 500;
    }

    .reel-audio-info {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
    }

    .reel-audio-icon {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #6C63FF, #FF6B9D);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      animation: spin 4s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Progress bar at bottom */
    .reel-progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.2);
      z-index: 10;
    }
    .reel-progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6C63FF, #FF6B9D);
      transition: width 0.5s linear;
    }

    /* Play/Pause overlay */
    .play-pause-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.4);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 10;
    }
    .play-pause-overlay.show {
      opacity: 1;
    }

    /* ── RIGHT SIDEBAR ── */
    .reels-right-sidebar {
      width: 320px;
      height: 100vh;
      border-left: 1px solid var(--glass-border, rgba(108,99,255,0.15));
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
      background: var(--bg-color, #0d0d1a);
      scrollbar-width: thin;
    }

    .right-sidebar-inner {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .rs-card {
      background: var(--bg-card, #13132b);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--glass-border, rgba(108,99,255,0.1));
    }

    .rs-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .rs-card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-color);
    }

    .rs-see-all {
      font-size: 0.78rem;
      color: #6C63FF;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .rs-see-all:hover { text-decoration: underline; }

    /* Suggested user row */
    .suggested-user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }

    .su-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
    }
    .su-avatar-initials {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
      flex-shrink: 0;
    }

    .su-info {
      flex: 1;
      min-width: 0;
    }
    .su-name {
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .su-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .su-follow-btn {
      background: none;
      border: 1px solid #6C63FF;
      color: #6C63FF;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .su-follow-btn:hover {
      background: #6C63FF;
      color: #fff;
    }
    .su-follow-btn.following {
      background: rgba(108,99,255,0.15);
      border-color: transparent;
      color: var(--text-muted);
    }

    /* Trending audio row */
    .trending-audio-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .trending-audio-row:hover {
      background: var(--bg-hover);
      margin: 0 -8px;
      padding: 8px 8px;
    }

    .ta-thumb {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6C63FF, #FF6B9D);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .ta-info {
      flex: 1;
      min-width: 0;
    }
    .ta-title {
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ta-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .ta-play-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(108,99,255,0.15);
      border: none;
      color: #6C63FF;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .ta-play-btn:hover {
      background: #6C63FF;
      color: #fff;
    }

    /* Empty state */
    .empty-reels {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      gap: 12px;
    }

    /* Upload modal */
    .upload-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .upload-modal-overlay.show { display: flex; }
    .upload-modal-box {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      border: 1px solid var(--glass-border);
    }
    .upload-modal-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .reels-right-sidebar { display: none; }
    }
    @media (max-width: 768px) {
      .reels-sidebar { width: 64px; }
      .sidebar-brand span, .sidebar-nav a span:not(.nav-icon), .sidebar-user-info { display: none; }
      .sidebar-nav a { justify-content: center; padding: 12px; }
      .sidebar-badge { position: absolute; top: 4px; right: 4px; }
    }
  </style>
</head>
<body>

  <!-- ── LEFT SIDEBAR ── -->
  <aside class="reels-sidebar">
    <div class="sidebar-brand" onclick="window.location.href='/feed.html'">
      <i class="fa-solid fa-bolt"></i>
      <span>Vibe</span>
    </div>

    <ul class="sidebar-nav" id="sidebar-nav">
      <li><a href="/feed.html"><span class="nav-icon"><i class="fa-solid fa-house"></i></span><span>Home</span></a></li>
      <li><a href="/search.html"><span class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></span><span>Search</span></a></li>
      <li><a href="/feed.html"><span class="nav-icon"><i class="fa-solid fa-compass"></i></span><span>Explore</span></a></li>
      <li><a href="/reels.html" class="active"><span class="nav-icon"><i class="fa-solid fa-film"></i></span><span>Reels</span></a></li>
      <li>
        <a href="/messages.html">
          <span class="nav-icon"><i class="fa-solid fa-paper-plane"></i></span>
          <span>Messages</span>
          <span class="sidebar-badge" id="dm-badge-side" style="display:none">0</span>
        </a>
      </li>
      <li>
        <a href="/feed.html">
          <span class="nav-icon"><i class="fa-regular fa-heart"></i></span>
          <span>Notifications</span>
          <span class="sidebar-badge" id="notif-badge-side" style="display:none">0</span>
        </a>
      </li>
      <li>
        <a href="#" onclick="openUploadModal()">
          <span class="nav-icon"><i class="fa-solid fa-plus-square"></i></span>
          <span>Create</span>
        </a>
      </li>
      <li><a href="#" id="profile-link"><span class="nav-icon"><i class="fa-regular fa-user"></i></span><span>Profile</span></a></li>
      <li><a href="/bookmarks.html"><span class="nav-icon"><i class="fa-regular fa-bookmark"></i></span><span>Saved</span></a></li>
    </ul>

    <div class="sidebar-user" id="sidebar-user" onclick="goToMyProfile()">
      <div id="sidebar-user-avatar"></div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebar-username">Loading...</div>
        <div class="sidebar-user-handle" id="sidebar-handle">@...</div>
      </div>
    </div>
  </aside>

  <!-- ── CENTER ── -->
  <main class="reels-main">
    <!-- Top bar -->
    <div class="reels-topbar">
      <span class="reels-topbar-title"><i class="fa-solid fa-film"></i> Reels</span>
      <div class="reels-topbar-actions">
        <button class="topbar-icon-btn" onclick="window.location.href='/messages.html'" title="Messages">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
        <button class="topbar-icon-btn" id="theme-toggle-btn" title="Toggle Theme">
          <i class="fa-solid fa-moon"></i>
        </button>
        <div id="nav-avatar-top" style="cursor:pointer" onclick="goToMyProfile()"></div>
      </div>
    </div>

    <!-- Reels scroll feed -->
    <div class="reels-feed-wrapper">
      <div class="reels-scroll-container" id="reels-scroll-container">
        <div class="empty-reels" id="reels-loading" style="height:100%">
          <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;color:#6C63FF"></i>
          <p>Loading Reels...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- ── RIGHT SIDEBAR ── -->
  <aside class="reels-right-sidebar">
    <div class="right-sidebar-inner">

      <!-- Suggested for You -->
      <div class="rs-card">
        <div class="rs-card-header">
          <span class="rs-card-title">Suggested for you</span>
          <a href="/search.html" class="rs-see-all">See all</a>
        </div>
        <div id="suggested-users-list">
          <div style="text-align:center;padding:10px;color:var(--text-muted)">
            <i class="fa-solid fa-spinner fa-spin"></i>
          </div>
        </div>
      </div>

      <!-- Trending Audio -->
      <div class="rs-card">
        <div class="rs-card-header">
          <span class="rs-card-title">Trending Audio</span>
          <a href="#" class="rs-see-all">See all</a>
        </div>
        <div id="trending-audio-list">
          <!-- Populated statically since we don't have audio data -->
        </div>
      </div>

    </div>
  </aside>

  <!-- ── Upload Modal ── -->
  <div class="upload-modal-overlay" id="upload-modal">
    <div class="upload-modal-box">
      <h2 class="upload-modal-title"><i class="fa-solid fa-film" style="color:#6C63FF;margin-right:8px"></i>Create Reel</h2>
      <div style="margin-bottom:14px">
        <label style="display:block;margin-bottom:6px;font-size:0.85rem;color:var(--text-muted)">Select Video (MP4, WebM — max 50MB)</label>
        <input type="file" id="reel-file" accept="video/mp4,video/webm,video/quicktime" style="color:var(--text-color);width:100%">
      </div>
      <div style="margin-bottom:18px">
        <label style="display:block;margin-bottom:6px;font-size:0.85rem;color:var(--text-muted)">Caption</label>
        <textarea id="reel-caption" placeholder="Write a caption and add #hashtags..." rows="3"
          style="width:100%;background:var(--bg-hover);border:1px solid var(--glass-border);border-radius:10px;padding:10px;color:var(--text-color);font-family:inherit;resize:none;outline:none"></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeUploadModal()">Cancel</button>
        <button class="btn btn-primary" id="reel-upload-btn" onclick="doUploadReel()">
          <i class="fa-solid fa-upload" style="margin-right:5px"></i>Upload
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/reels.js"></script>
</body>
</html>
