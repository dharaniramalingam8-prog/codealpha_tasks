<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Vibe</title>
  <meta name="description" content="Direct messages on Vibe Social." />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <nav class="navbar">
    <span class="navbar-brand" onclick="window.location.href='/feed.html'">✦ Vibe</span>
    <div class="navbar-actions">
      <div class="notif-wrapper">
        <button class="notif-btn" onclick="toggleNotifDropdown()">🔔<span class="notif-badge" id="notif-badge" style="display:none">0</span></button>
        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-dropdown-header"><h3>Notifications</h3></div>
          <div id="notif-list"></div>
        </div>
      </div>
      <button class="theme-toggle-btn" id="theme-toggle" onclick="handleThemeToggle()">☀️</button>
      <div id="nav-avatar"></div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="messages-layout">
    <!-- Conversations Panel -->
    <div class="conversations-panel" id="conversations-panel">
      <div class="conversations-header">
        <h2>💬 Messages</h2>
        <button class="btn btn-primary btn-sm" onclick="showNewDM()">+ New</button>
      </div>

      <!-- Search for new DM -->
      <div id="new-dm-area" style="display:none;padding:12px 16px;border-bottom:1px solid var(--glass-border)">
        <div class="search-wrapper" style="width:100%">
          <span class="search-icon">🔍</span>
          <input id="dm-search-input" type="text" class="search-input" style="width:100%"
            placeholder="Search users to message..." autocomplete="off" />
          <div class="search-results" id="dm-search-results"></div>
        </div>
      </div>

      <div class="conversations-list" id="conversations-list">
        <div style="padding:20px;text-align:center"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chat-panel">
      <div class="chat-placeholder" id="chat-placeholder">
        <span style="font-size:3rem">💬</span>
        <p>Select a conversation to start chatting</p>
      </div>

      <!-- Chat Header (hidden until a conversation is selected) -->
      <div class="chat-header" id="chat-header" style="display:none">
        <div id="chat-header-avatar"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-header-name"></div>
          <div id="typing-indicator" class="typing-indicator" style="display:none">typing...</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="goToProfile(currentOtherUserId)">View Profile</button>
      </div>

      <div class="chat-messages" id="chat-messages" style="display:none"></div>

      <div class="chat-input-bar" id="chat-input-bar" style="display:none">
        <textarea class="chat-input" id="chat-input" rows="1"
          placeholder="Type a message… (Enter to send)"
          onkeydown="handleChatKey(event)"
          oninput="handleTyping()"></textarea>
        <button class="chat-send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/messages.js"></script>
</body>
</html>
