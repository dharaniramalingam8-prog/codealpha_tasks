<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Vibe</title>
  <meta name="description" content="View user profile on Vibe Social." />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <span class="navbar-brand" onclick="window.location.href='/feed.html'">✦ Vibe</span>
    <div class="navbar-actions">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" class="search-input" placeholder="Search people..." autocomplete="off" />
        <div class="search-results" id="search-results"></div>
      </div>

      <div class="notif-wrapper">
        <button class="notif-btn" onclick="toggleNotifDropdown()" title="Notifications">
          🔔<span class="notif-badge" id="notif-badge" style="display:none">0</span>
        </button>
        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-dropdown-header">
            <h3>Notifications</h3>
            <button class="notif-mark-all" onclick="markAllNotifRead()">Mark all read</button>
          </div>
          <div id="notif-list"></div>
        </div>
      </div>

      <a href="/messages.html" class="dm-btn" title="Messages">💬</a>
      <button class="theme-toggle-btn" id="theme-toggle" onclick="handleThemeToggle()">☀️</button>
      <div id="nav-avatar"></div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <!-- Layout (single column) -->
  <div class="page-layout" style="grid-template-columns:1fr;max-width:720px">
    <main class="main-content">

      <!-- Profile Header (replaced on load) -->
      <div id="profile-header" class="card profile-header-card">
        <div class="profile-cover-placeholder"></div>
        <div style="padding:0 24px 24px">
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:-55px;margin-bottom:12px">
            <div class="skeleton avatar-xl" style="border-radius:50%;width:110px;height:110px;border:4px solid var(--bg-primary)"></div>
          </div>
          <div class="skeleton" style="height:24px;width:180px;margin-bottom:8px;border-radius:6px"></div>
          <div class="skeleton" style="height:16px;width:120px;margin-bottom:12px;border-radius:6px"></div>
          <div class="skeleton" style="height:14px;width:260px;margin-bottom:20px;border-radius:6px"></div>
        </div>
      </div>

      <!-- Post Tabs -->
      <div class="profile-tabs">
        <button class="profile-tab active" id="tab-posts" onclick="showTab('posts')">📝 Posts</button>
        <button class="profile-tab" id="tab-about" onclick="showTab('about')">👤 About</button>
      </div>

      <!-- Posts Section -->
      <div id="posts-section">
        <div id="user-posts-container"></div>
        <div style="text-align:center;padding:12px 0">
          <button class="btn btn-secondary" id="load-more-btn" style="display:none" onclick="loadMorePosts()">Load More</button>
          <div id="posts-ended" style="display:none;color:var(--text-muted);font-size:.875rem">All posts loaded ✨</div>
        </div>
      </div>

      <!-- About Section -->
      <div id="about-section" style="display:none">
        <div class="card" style="padding:24px" id="about-card"></div>
      </div>

    </main>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" id="edit-profile-modal">
    <div class="modal" style="max-width:540px">
      <div class="modal-header">
        <h2 class="modal-title">Edit Profile</h2>
        <button class="modal-close" onclick="closeEditProfile()">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">

        <!-- Profile Picture -->
        <div class="input-group">
          <label>Profile Picture</label>
          <div class="image-upload-area" id="pp-upload-area" onclick="document.getElementById('pp-file').click()" style="height:80px;display:flex;align-items:center;gap:16px;padding:12px 16px">
            <input type="file" id="pp-file" accept="image/*" onchange="previewProfilePic(event)" style="display:none" />
            <div id="pp-preview-wrap">
              <div id="pp-preview-avatar" class="avatar avatar-md"></div>
            </div>
            <div style="font-size:.85rem;color:var(--text-muted)">Click to upload new profile picture</div>
          </div>
        </div>

        <!-- Cover Photo -->
        <div class="input-group">
          <label>Cover Photo</label>
          <div class="image-upload-area" id="cover-upload-area" onclick="document.getElementById('cover-file').click()" style="height:80px;display:flex;align-items:center;gap:16px;padding:12px 16px">
            <input type="file" id="cover-file" accept="image/*" onchange="previewCoverPhoto(event)" style="display:none" />
            <div id="cover-preview-wrap">
              <div style="width:80px;height:48px;border-radius:8px;background:var(--accent-gradient)"></div>
            </div>
            <div style="font-size:.85rem;color:var(--text-muted)">Click to upload cover photo</div>
          </div>
        </div>

        <!-- Username -->
        <div class="input-group">
          <label for="edit-username">Username</label>
          <input id="edit-username" class="input" type="text" maxlength="30" placeholder="Username" pattern="[a-zA-Z0-9_]+" />
        </div>

        <!-- Bio -->
        <div class="input-group">
          <label for="edit-bio">Bio</label>
          <textarea id="edit-bio" class="input" rows="3" maxlength="200" placeholder="Tell people about yourself..."></textarea>
        </div>

        <!-- Website -->
        <div class="input-group">
          <label for="edit-website">Website</label>
          <input id="edit-website" type="url" class="input" placeholder="https://yoursite.com" />
        </div>

        <!-- Avatar Color -->
        <div class="input-group">
          <label>Avatar Color</label>
          <div id="color-picker" style="display:flex;gap:10px;flex-wrap:wrap;padding:4px 0"></div>
        </div>

        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-secondary" onclick="closeEditProfile()">Cancel</button>
          <button class="btn btn-primary" id="save-profile-btn" onclick="saveProfile()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Followers/Following Modal -->
  <div class="modal-overlay" id="follow-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="follow-modal-title">Followers</h2>
        <button class="modal-close" onclick="closeFollowModal()">✕</button>
      </div>
      <div id="follow-modal-list" style="max-height:360px;overflow-y:auto"></div>
    </div>
  </div>

  <!-- Edit Post Modal -->
  <div class="modal-overlay" id="edit-post-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Edit Post</h2>
        <button class="modal-close" onclick="closeEditPostModal()">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="input-group">
          <label for="edit-post-content">Content</label>
          <textarea id="edit-post-content" class="edit-textarea" maxlength="500"></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-secondary" onclick="closeEditPostModal()">Cancel</button>
          <button class="btn btn-primary" id="edit-post-save-btn" onclick="savePostEdit()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/profile.js"></script>
</body>
</html>
