{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>Edit Product</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text"
           name="name"
           value="{{ product.name }}"
           class="form-control mb-2">

    <input type="number"
           name="price"
           value="{{ product.price }}"
           class="form-control mb-2">

    <input type="text"
           name="image"
           value="{{ product.image }}"
           class="form-control mb-2">

    <input type="text"
           name="category"
           value="{{ product.category }}"
           class="form-control mb-2">
           <label>Stock</label>
    <input type="number"
           name="stock"
           class="form-control"
           value="{{ product.stock }}">

    <textarea name="description"
              class="form-control mb-2">{{ product.description }}</textarea>

    <button class="btn btn-success">
        Update Product
    </button>
</form>

</div>

{% endblock %}
